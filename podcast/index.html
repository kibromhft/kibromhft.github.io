	<script>

	// initialize Wavesurfer.js
	const wavesurfer = WaveSurfer.create({
	  container: '.waveform',
	  waveColor: '#ddd',
	  progressColor: '#333',
	  barWidth: 3,
	  height: 50
	});

	// handle clicking on a podcast item
	const podcastItems = document.querySelectorAll('.podcast-item');
	podcastItems.forEach((item) => {
	  item.addEventListener('click', () => {
		// remove active class from all podcast items
		podcastItems.forEach((i) => i.classList.remove('active'));
		// add active class to clicked item
		item.classList.add('active');
		// load audio source into Wavesurfer
		const audioSource = item.querySelector('audio').src;
		wavesurfer.load(audioSource);
	  });
	});

	// handle play button click
	const playButton = document.querySelector('.play-btn');
	playButton.addEventListener('click', () => {
	  wavesurfer.play();
	});

	// handle pause button click
	const pauseButton = document.querySelector('.pause-btn');
	pauseButton.addEventListener('click', () => {
	  wavesurfer.pause();
	});

	// handle stop button click
	const stopButton = document.querySelector('.stop-btn');
	stopButton.addEventListener('click', () => {
	  wavesurfer.stop();
	});

	// update progress bar as audio plays
	wavesurfer.on('audioprocess', () => {
	  const progressElement = document.querySelector('.progress');
	  const progress = (wavesurfer.getCurrentTime() / wavesurfer.getDuration()) * 100;
	  progressElement.style.width = `${progress}%`;
	});


	</script>

<script>
    let menu = document.getElementById('menu')
    if (menu) {
        menu.scrollLeft = localStorage.getItem("menu-scroll-position");
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
