    <div class="music-player">
      <h1>Music Player</h1>
      <audio id="audio-player"></audio>
      <div class="song-details">
        <h2 id="song-title"></h2>
        <h3 id="song-artist"></h3>
      </div>
      <div class="controls">
        <button id="play-button">Play</button>
        <button id="pause-button">Pause</button>
        <button id="stop-button">Stop</button>
        <button id="previous-button">Previous</button>

        <button id="shuffle-button">Shuffle</button>

        <h2>Playlist</h2>

      </div>

	<script>
		// Song objects with title, artist, and audio file path
var songs = [
  {
    title: 'Song 1',
    artist: 'Artist 1',
    audio: 'song1.mp3'
  },
  {
    title: 'Song 2',
    artist: 'Artist 2',
    audio: 'song2.mp3'
  },
  {
    title: 'Song 3',
    artist: 'Artist 3',
    audio: 'song3.mp3'
  },
  {
    title: 'Song 4',
    artist: 'Artist 4',
    audio: 'song4.mp3'
  },
  {
    title: 'Song 5',
    artist: 'Artist 5',
    audio: 'song5.mp3'
  },
  {
    title: 'Song 6',
    artist: 'Artist 6',
    audio: 'song6.mp3'
  },
  {
    title: 'Song 7',
    artist: 'Artist 7',
    audio: 'song7.mp3'
  },
  {
    title: 'Song 8',
    artist: 'Artist 8',
    audio: 'song8.mp3'
  },
  {
    title: 'Song 9',
    artist: 'Artist 9',
    audio: 'song9.mp3'
  },
  {
    title: 'Song 10',
    artist: 'Artist 10',
    audio: 'song10.mp3'
  }
];

var currentSong = 0;
var isShuffled = false;
var isRepeated = false;

var audioPlayer = document.getElementById('audio-player');
var songTitle = document.getElementById('song-title');
var songArtist = document.getElementById('song-artist');
var playButton = document.getElementById('play-button');
var pauseButton = document.getElementById('pause-button');
var stopButton = document.getElementById('stop-button');
var previousButton = document.getElementById('previous-button');
var nextButton = document.getElementById('next-button');
var shuffleButton = document.getElementById('shuffle-button');
var repeatButton = document.getElementById('repeat-button');
var playlistUl = document.getElementById('playlist-ul');

// Display the first song in the playlist when the page loads
displaySong();

// Add event listeners to the buttons
playButton.addEventListener('click', playSong);
pauseButton.addEventListener('click', pauseSong);
stopButton.addEventListener('click', stopSong);
previousButton.addEventListener('click', previousSong);
nextButton.addEventListener('click', nextSong);
shuffleButton.addEventListener('click', toggleShuffle);
repeatButton.addEventListener('click', toggleRepeat);

// Display the song details and play the audio for the current song
function displaySong() {
  songTitle.textContent = songs[currentSong].title;
  songArtist.textContent = songs[currentSong].artist;
  audioPlayer.src = songs[currentSong].audio;
  audioPlayer.play();
}

// Play the audio
function playSong() {
  audioPlayer.play();
}

// Pause the audio
function pauseSong() {
  audioPlayer.pause();
}

// Stop the audio and reset the current time to 0
function stopSong() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
}

// Play the previous song in the playlist
function previousSong() {
  currentSong--;
  if (currentSong < 0) {
    currentSong = songs.length - 1;
  }
  displaySong();
}

// Play the next song in the playlist
function nextSong() {
  currentSong++;
  if (currentSong >= songs.length) {
    currentSong = 0;
  }
  displaySong();
}

// Toggle shuffle on/off
function toggleShuffle() {
  isShuffled = !isShuffled;
  if (isShuffled) {
    shuffleButton.classList.add('active');
  } else {
    shuffleButton.classList.remove('active');
  }
}

// Toggle repeat on/off
function toggleRepeat() {
  isRepeated = !isRepeated;
  if (isRepeated) {
    repeatButton.classList.add('active');
  } else {
    repeatButton.classList.remove('active');
  }
}

// Display the playlist
for (var i = 0; i < songs.length; i++) {
  var li = document.createElement('li');
  li.textContent = songs[i].title + ' - ' + songs[i].artist;
  li.dataset.index = i;
  li.addEventListener('click', function() {
    currentSong = this.dataset.index;
    displaySong();
  });
  playlistUl.appendChild(li);
}


	</script>

<script>
    let menu = document.getElementById('menu')
    if (menu) {
        menu.scrollLeft = localStorage.getItem("menu-scroll-position");
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
